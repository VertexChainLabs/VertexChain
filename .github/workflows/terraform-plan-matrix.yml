name: Terraform Plan Matrix

# Validates `terraform plan` against all three environments on every PR that
# touches Terraform sources.  Each environment runs as an independent parallel
# job so failures are scoped to the affected env.
#
# On push to main the matrix is also triggered so that workspace drift is
# caught before a manual apply is run.

on:
  pull_request:
    paths:
      - 'infrastructure/terraform/**'
      - '.github/workflows/terraform-plan-matrix.yml'
  push:
    branches: [main]
    paths:
      - 'infrastructure/terraform/**'
  workflow_dispatch:

concurrency:
  group: tf-matrix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write      # OIDC → AWS
  contents: read
  pull-requests: write # post plan summaries as PR comments

env:
  TF_VERSION:    '1.9.8'
  AWS_REGION:    'us-east-1'
  TF_WORKING_DIR: 'infrastructure/terraform'

jobs:
  # ── plan matrix ─────────────────────────────────────────────────────────────
  plan:
    name: Plan (${{ matrix.env }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false          # run all three even if one fails
      matrix:
        env: [dev, staging, prod]

    environment: ${{ matrix.env }}

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Re-initialise with the workspace-specific state key so each plan reads
      # from (and writes no state to) the correct S3 prefix.
      - name: Terraform Init (${{ matrix.env }})
        run: |
          terraform init \
            -reconfigure \
            -backend-config="key=env/${{ matrix.env }}/terraform.tfstate" \
            -input=false

      - name: Select / create workspace (${{ matrix.env }})
        run: |
          terraform workspace select "${{ matrix.env }}" \
            || terraform workspace new "${{ matrix.env }}"

      # Plans are speculative (no -out) — they validate the config and produce
      # a human-readable diff without touching real infrastructure.
      - name: Terraform Plan (${{ matrix.env }})
        id: plan
        run: |
          terraform plan \
            -var-file="envs/terraform.tfvars.${{ matrix.env }}" \
            -input=false \
            -no-color \
            2>&1 | tee /tmp/plan-${{ matrix.env }}.txt
          # Preserve exit code: 0 = no changes, 2 = changes present, other = error
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      # Post a collapsible plan summary to the PR for each environment.
      - name: Comment plan on PR (${{ matrix.env }})
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require('fs');
            const plan = fs.readFileSync('/tmp/plan-${{ matrix.env }}.txt', 'utf8');
            const status = '${{ steps.plan.outcome }}';
            const icon   = status === 'success' ? '✅' : '❌';

            const body = [
              `### ${icon} Terraform Plan — \`${{ matrix.env }}\``,
              '',
              '<details><summary>Show plan output</summary>',
              '',
              '```hcl',
              plan.slice(0, 60000),   // GitHub comment size cap
              '```',
              '',
              '</details>',
            ].join('\n');

            // Delete any previous plan comment for this env to keep the PR tidy.
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments) {
              if (
                c.user.type === 'Bot' &&
                c.body.includes(`Terraform Plan — \`${{ matrix.env }}\``)
              ) {
                await github.rest.issues.deleteComment({
                  ...context.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body,
            });

      # Fail the job after posting the comment so the PR check turns red.
      - name: Assert plan succeeded (${{ matrix.env }})
        if: steps.plan.outcome == 'failure'
        run: |
          echo "::error::terraform plan failed for environment: ${{ matrix.env }}"
          exit 1

  # ── summary gate ────────────────────────────────────────────────────────────
  # A single status check that branch-protection rules can target instead of
  # three individual matrix jobs.
  all-plans-passed:
    name: All Plans Passed
    runs-on: ubuntu-latest
    needs: plan
    if: always()
    steps:
      - name: Check matrix result
        run: |
          if [[ "${{ needs.plan.result }}" != "success" ]]; then
            echo "::error::One or more terraform plan jobs failed."
            exit 1
          fi
          echo "All environment plans passed."
