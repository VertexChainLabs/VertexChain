{{- if and .Values.backend.enabled (not .Values.backend.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vertexchain.backendSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vertexchain.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  DATABASE_PASSWORD: {{ .Values.backend.secrets.DATABASE_PASSWORD | quote }}
  PINATA_API_KEY: {{ .Values.backend.secrets.PINATA_API_KEY | quote }}
  PINATA_SECRET_KEY: {{ .Values.backend.secrets.PINATA_SECRET_KEY | quote }}
  STELLAR_SECRET_KEY: {{ .Values.backend.secrets.STELLAR_SECRET_KEY | quote }}
{{- end }}
